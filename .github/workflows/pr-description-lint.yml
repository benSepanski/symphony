name: pr-description-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          BODY="${PR_BODY:-}"

          if [ -z "$BODY" ]; then
            echo "::error::PR description is empty. Fill in the PR template."
            exit 1
          fi

          missing=()
          for heading in "#### Context" "#### TL;DR" "#### Summary" "#### Demo" "#### Test Plan"; do
            if ! printf '%s' "$BODY" | grep -qxF "$heading"; then
              missing+=("$heading")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::PR description is missing required sections:"
            for h in "${missing[@]}"; do
              echo "  - $h"
            done
            echo
            echo "See .github/pull_request_template.md for the expected format."
            exit 1
          fi

          echo "PR description has all required sections."
